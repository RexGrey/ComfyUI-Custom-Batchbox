settings:
  default_timeout: 600
  max_retries: 3
  auto_failover: true
  log_level: INFO
  retry_delay: 1
  retry_on:
  - 429
  - 502
  - 503
  - 504
save_settings:
  enabled: true
  output_dir: batchbox
  format: png
  quality: 95
  naming_pattern: '{model}_{timestamp}_{seed}'
  create_date_subfolder: true
  include_prompt: false
  prompt_max_length: 50
  fallback_format: png
model_order:
  image:
  # --- Banana Pro 系列 (Gemini 3 Pro) ---
  - NanoBananaPro
  - Nano Banana Pro 2k
  - Nano Banana Pro 4K
  # --- Banana 系列 ---
  - NanoBanana2
  - NanoBanana
  # --- Seedream 系列 (豆包/即梦) ---
  - SeedReam_v50(文生图)
  - Seedream_v45
  - Seedream_v4
  # --- OpenAI 系列 ---
  - gpt4o_image(文生图)
  - dalle3(文生图)
  - sora_image(文生图)
  # --- Flux 系列 ---
  - flux_dev(文生图)
  - flux_schnell(文生图)
  # --- 其他 ---
  - midjourney(文生图)
node_settings:
  default_width: 480
  bypass_queue_prompt: true
  show_in_canvas_menu: true
  smart_cache_hash_check: true
  pricing_strategy: bestBalance
  auto_endpoint_mode: round_robin
  preview_mode: progressive
upscale_settings:
  model: NanoBananaPro
  default_params:
    image_size: 4K
    aspect_ratio: auto
    seed: '0'
  endpoint: ''
style_presets:
  电影写实: 以电影级写实风格处理，保持自然光影和真实质感
  现代数字艺术: 以现代数字艺术风格处理，色彩鲜艳，细节丰富
  复古油画: 以古典油画风格处理，带有厚重的笔触感和温暖的色调
  日式动漫: 以日式动漫风格处理，线条清晰，色彩明快
  水墨国风: 以中国传统水墨画风格处理，注重意境和留白
