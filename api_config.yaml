node_categories:
  text:
    display_name: 📝 文本生成
    description: 脚本、广告词、品牌文案
    enabled: true
  image:
    display_name: 🖼️ 图片生成
    description: AI绘图、图片编辑
    enabled: true
  video:
    display_name: 🎬 视频生成
    description: 文生视频、图生视频
    enabled: true
  audio:
    display_name: 🎵 音频生成
    description: 语音合成、音乐生成
    enabled: true
    beta: true
  image_editor:
    display_name: 🔧 图片编辑器
    description: 高清放大、背景替换
    enabled: true
models:
  dalle3(文生图):
    display_name: 🖼️ DALL-E-3 (兼容性王·文生图)
    category: image
    description: 最稳定的生图模型
    show_seed_widget: true
    parameter_schema:
      basic:
        prompt:
          type: string
          default: ''
        size:
          type: select
          default: 1024x1024
          options:
          - value: 1024x1024
            label: 1024x1024
          - value: 1792x1024
            label: 1792x1024 (横版)
          - value: 1024x1792
            label: 1024x1792 (竖版)
        quality:
          type: select
          default: standard
          options:
          - value: standard
            label: 标准
          - value: hd
            label: 高清
      advanced:
        style:
          type: select
          default: vivid
          options:
          - value: vivid
            label: 鲜艳
          - value: natural
            label: 自然
    api_endpoints:
    - display_name: ''
      provider: bltcy_ai
      priority: 1
      model_name: dall-e-3
      modes:
        text2img:
          endpoint: /v1/images/generations
          method: POST
          content_type: application/json
          response_type: sync
          response_path: data[0].url
  gpt4o_image(文生图):
    display_name: 🖼️ GPT-4o-Image (创意·文生图)
    category: image
    description: GPT-4o 强大的图片生成能力
