  midjourney(文生图):
    display_name: 🖼️ Midjourney (旗舰艺术·文生图)
    category: image
    description: MJ 专用代理接口
    show_seed_widget: false
    parameter_schema:
      basic:
        prompt:
          type: string
          default: ''
        aspect_ratio:
          type: select
          default: '1:1'
          options:
          - value: '1:1'
            label: '1:1'
          - value: '16:9'
            label: '16:9'
          - value: '9:16'
            label: '9:16'
          - value: '4:3'
            label: '4:3'
          - value: '3:4'
            label: '3:4'
      advanced:
        版本:
          type: select
          default: v6
          api_name: version
          options:
          - value: v5
            label: V5
          - value: v5.2
            label: V5.2
          - value: v6
            label: V6
        风格化:
          type: number
          default: '100'
          api_name: stylize
    api_endpoints:
    - provider: bltcy_ai
      priority: 1
      model_name: midjourney
      modes:
        text2img:
          endpoint: /mj/submit/imagine
          method: POST
          content_type: application/json
          response_type: async
          task_id_path: task_id
          polling_endpoint: /mj/task/{{task_id}}/fetch
          status_path: status
          success_value: SUCCESS
          response_path: imageUrl
  luma_video:
    display_name: 🎥 Luma Video (光影效果✓)
    category: video
    description: Luma AI 视频生成，光影效果佳
    show_seed_widget: false
    dynamic_inputs:
      image:
        max: 2
        type: IMAGE
        label: 图片
    parameter_schema:
      basic:
        prompt:
          type: string
          default: ''
        duration:
          type: select
          default: '5'
          options:
          - value: '5'
            label: 5秒
          - value: '10'
            label: 10秒
        aspect_ratio:
          type: select
          default: '16:9'
          options:
          - value: '16:9'
            label: '16:9'
          - value: '9:16'
            label: '9:16'
          - value: '1:1'
            label: '1:1'
      advanced: {}
    api_endpoints:
    - provider: bltcy_ai
      priority: 1
      model_name: luma_video_api
      modes:
        text2video:
          endpoint: /v1/video/generations
          method: POST
          content_type: application/json
          response_type: async
          task_id_path: task_id
          polling_endpoint: /v1/video/tasks/{{task_id}}
          status_path: status
          success_value: SUCCESS
          response_path: video_url
        img2video:
          endpoint: /v1/video/generations
          method: POST
          content_type: multipart/form-data
          response_type: async
          task_id_path: task_id
          polling_endpoint: /v1/video/tasks/{{task_id}}
          status_path: status
          success_value: SUCCESS
          response_path: video_url
